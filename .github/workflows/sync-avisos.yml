name: Sync Avisos

# Sync diário dos avisos (PT2030, PRR, IPDJ, Horizon/CORDIS, Europa Criativa)
# para a BD de produção. Corre antes do cron Vercel das 06:30 UTC
# (check-new-avisos), para o cruzamento avisos×leads apanhar dados frescos.
# PEPAC fica de fora deste job: o scraper precisa de Firecrawl/Playwright
# (ver apify-actors/super-scraper/dist/lib/pepac-playwright.js).

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

concurrency:
  group: sync-avisos
  cancel-in-progress: false

jobs:
  sync:
    name: 📡 Sync avisos → BD
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build super-scraper
        # sync-avisos-to-db.ts importa apify-actors/super-scraper/dist/lib/*.js,
        # e dist/ está no .gitignore — sem este build o job falha com MODULE_NOT_FOUND
        run: npm ci && npm run build
        working-directory: apify-actors/super-scraper

      - name: Run sync
        run: npx tsx scripts/sync-avisos-to-db.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # recuperarportugal.gov.pt não envia o certificado intermédio (Sectigo OV R36);
          # sem isto o scraper do PRR falha com "unable to verify the first certificate"
          NODE_EXTRA_CA_CERTS: apify-actors/super-scraper/certs/sectigo-ov-r36-intermediate.pem

      - name: Enrich avisos (LLM)
        # Enriquecimento pós-sync: descrições, datas (FA), beneficiários, CAE.
        # Fornecedor por ordem de preferência: OpenRouter (créditos pré-pagos =
        # tecto financeiro) > Cortecs (EU-soberano; requer LLM_MODEL) > Gemini direto.
        # Salta graciosamente enquanto nenhum secret de LLM estiver definido
        # (todas as chaves estavam inválidas a 2026-07-20 — ver scripts/update-ai-keys.sh).
        run: |
          if [ -z "$OPENROUTER_API_KEY" ] && [ -z "$CORTECS_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "Nenhuma chave LLM definida — enriquecimento saltado."
            exit 0
          fi
          npx tsx scripts/enrich-avisos.ts --commit --limit 150
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CORTECS_API_KEY: ${{ secrets.CORTECS_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_EXTRA_CA_CERTS: apify-actors/super-scraper/certs/sectigo-ov-r36-intermediate.pem

      - name: Eval de fidelidade do assistente
        # Guardrail diário: pergunta factos verificáveis contra a BD e faz
        # perguntas-armadilha sobre avisos inexistentes. Falha (e alerta) se o
        # assistente fabricar. Custa ~$0.02/dia — barato para o risco que cobre.
        if: ${{ env.OPENROUTER_API_KEY != '' }}
        run: npx tsx scripts/eval-assistant.ts --repeticoes 2
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CHATBOT_DATABASE_URL: ${{ secrets.CHATBOT_DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
