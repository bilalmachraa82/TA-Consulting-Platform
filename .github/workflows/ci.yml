name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint check
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Job 2: Tests
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload coverage (optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 3: Build
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Mock env vars for build (real values in Vercel)
          DATABASE_URL: 'postgresql://mock:mock@localhost/mock'
          NEXTAUTH_SECRET: 'ci-build-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'

  # Job 4: Type check — type errors fail the pipeline
  typecheck:
    name: 📝 TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # Job 5: E2E — critical path tests against a production build
  e2e:
    name: 🎭 E2E (Critical Path)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://mock:mock@localhost/mock'
          NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start production server
        run: npm start &
        env:
          DATABASE_URL: 'postgresql://mock:mock@localhost/mock'
          NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'
          PORT: '3000'

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break
            echo "Waiting for server... attempt $i"
            sleep 2
          done

      - name: Run E2E tests
        run: npx playwright test e2e/critical-path.spec.ts
        env:
          DATABASE_URL: 'postgresql://mock:mock@localhost/mock'
          NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
